version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: chave-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-chave}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-chave_secret}
      POSTGRES_DB: ${DB_NAME:-chave_auth}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-chave} -d ${DB_NAME:-chave_auth}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  chave-ms-auth:
    build:
      context: ../chave-ms-auth
      dockerfile: Dockerfile
    container_name: chave-ms-auth
    environment:
      PORT: 3001
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-chave}
      DB_PASSWORD: ${DB_PASSWORD:-chave_secret}
      DB_NAME: ${DB_NAME:-chave_auth}
      NODE_ENV: production
    ports:
      - "${MS_AUTH_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  chave-mfe-auth:
    build:
      context: ../chave-mfe-auth
      dockerfile: Dockerfile
    container_name: chave-mfe-auth
    environment:
      VITE_MS_AUTH_URL: http://localhost:3001
    ports:
      - "${MFE_AUTH_PORT:-4001}:4001"
    restart: unless-stopped

  chave-shell:
    build:
      context: ../chave-shell
      dockerfile: Dockerfile
    container_name: chave-shell
    environment:
      MFE_AUTH_URL: http://localhost:4001/assets/remoteEntry.js
    ports:
      - "${SHELL_PORT:-3000}:3000"
    depends_on:
      - chave-mfe-auth
    restart: unless-stopped

volumes:
  postgres_data: